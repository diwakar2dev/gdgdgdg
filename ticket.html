<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mart | Secure Support System</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #ffffff; 
            --dark-bg: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.8);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a, transparent 50%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
        }

        .dark-grid {
            background-size: 30px 30px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.01) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.01) 1px, transparent 1px);
        }

        .hidden { display: none !important; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        input, textarea {
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
        }

        input:focus, textarea:focus {
            border-color: white !important;
            outline: none;
        }
    </style>
</head>
<body class="dark-grid">

    <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="dark.png" alt="Dark Mart" class="w-8 h-8 grayscale brightness-200">
                <span class="text-sm font-[Unbounded] font-black tracking-tighter uppercase">DARK MART / SUPPORT</span>
            </a>
            <button onclick="showAdminLogin()" class="text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all">Admin Panel</button>
        </div>
    </nav>

    <div class="pt-32 pb-20 px-6 max-w-4xl mx-auto">
        
        <div id="referralView" class="text-center" data-aos="fade-up">
            <h1 class="text-4xl font-[Unbounded] font-black mb-4 uppercase">Verification</h1>
            <p class="text-gray-500 mb-8">Please tell us who referred you to our services.</p>
            <div class="max-w-sm mx-auto">
                <input type="text" id="referrerName" placeholder="Referrer Name / Discord ID" class="w-full p-4 rounded-xl mb-4 transition-all">
                <button onclick="submitReferral()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-sm hover:scale-105 transition-all">Open Ticket System</button>
            </div>
        </div>

        <div id="createTicketView" class="hidden text-center" data-aos="fade-up">
            <h1 class="text-4xl font-[Unbounded] font-black mb-4 uppercase">New Request</h1>
            <p class="text-gray-500 mb-8">Describe the product or service you want to buy.</p>
            <div class="max-w-md mx-auto">
                <textarea id="ticketSubject" placeholder="Ex: I want to buy 10k Robux and a VPS..." class="w-full h-32 p-4 rounded-xl mb-4 transition-all resize-none"></textarea>
                <button onclick="createTicket()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-sm">Create Ticket</button>
            </div>
        </div>

        <div id="chatView" class="hidden" data-aos="fade-up">
            <div class="glass rounded-3xl overflow-hidden flex flex-col h-[600px]">
                <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                    <div class="flex flex-col">
                        <span id="chatTitle" class="font-black uppercase text-xs tracking-widest">Ticket #DM-0000</span>
                        <span id="chatReferrer" class="text-[9px] text-gray-500 uppercase font-bold">Ref: None</span>
                    </div>
                    <button onclick="goBack()" id="backBtn" class="text-[10px] font-black text-gray-400 hover:text-white uppercase">Close Chat</button>
                </div>
                
                <div id="messageBox" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm">
                    </div>

                <div class="p-4 border-t border-white/5 bg-white/[0.02] flex gap-2">
                    <input type="text" id="messageInput" placeholder="Type your message..." class="flex-1 p-3 rounded-xl outline-none">
                    <button id="sendBtn" class="bg-white text-black px-6 rounded-xl font-black text-xs uppercase">Send</button>
                </div>
            </div>
        </div>

        <div id="adminDashboard" class="hidden" data-aos="fade-in">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Control Center</span>
                    <h1 class="text-3xl font-[Unbounded] font-black uppercase">Admin Panel</h1>
                </div>
                <button onclick="logoutAdmin()" class="text-xs font-bold text-red-500 uppercase tracking-tighter">Secure Logout</button>
            </div>
            
            <div id="ticketList" class="space-y-4">
                </div>
        </div>

    </div>

    <div id="adminLoginView" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="max-w-sm w-full text-center glass p-8 rounded-3xl">
            <h2 class="text-xl font-[Unbounded] font-black mb-6 uppercase">Restricted Access</h2>
            <input type="password" id="adminPass" placeholder="Enter Admin Password" class="w-full p-4 rounded-xl mb-4 outline-none text-center">
            <div class="flex gap-2">
                <button onclick="hideAdminLogin()" class="flex-1 border border-white/10 py-3 rounded-xl text-[10px] font-bold uppercase">Cancel</button>
                <button onclick="verifyAdmin()" class="flex-1 bg-white text-black py-3 rounded-xl text-[10px] font-black uppercase">Verify</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        const ADMIN_PASS = "DarkMart@638484";
        let activeTicketId = null;
        let isAdminMode = false;

        // View Controller
        function showView(viewId) {
            const views = ['referralView', 'createTicketView', 'chatView', 'adminDashboard'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        function goBack() {
            if (isAdminMode) {
                showView('adminDashboard');
                renderAdminList();
            } else {
                location.reload();
            }
        }

        // Referral Logic
        function submitReferral() {
            const val = document.getElementById('referrerName').value.trim();
            if(!val) return alert("Referrer name is required.");
            localStorage.setItem('tempReferrer', val);
            showView('createTicketView');
        }

        // Ticket Management
        function createTicket() {
            const subject = document.getElementById('ticketSubject').value.trim();
            if(!subject) return alert("Please describe your request.");
            
            const id = "DM-" + Math.floor(1000 + Math.random() * 9000);
            const newTicket = {
                id: id,
                subject: subject,
                referrer: localStorage.getItem('tempReferrer'),
                status: 'Open',
                messages: [{sender: 'System', text: "Welcome to Dark Mart Support. An admin will be with you shortly."}]
            };

            const tickets = JSON.parse(localStorage.getItem('dm_tickets') || "[]");
            tickets.push(newTicket);
            localStorage.setItem('dm_tickets', JSON.stringify(tickets));
            
            activeTicketId = id;
            isAdminMode = false;
            openChat(id);
        }

        // Chat Logic
        function openChat(id) {
            activeTicketId = id;
            showView('chatView');
            renderMessages();
            
            document.getElementById('sendBtn').onclick = () => sendMessage(isAdminMode ? 'Admin' : 'Customer');
        }

        function renderMessages() {
            const tickets = JSON.parse(localStorage.getItem('dm_tickets') || "[]");
            const ticket = tickets.find(t => t.id === activeTicketId);
            if(!ticket) return;

            document.getElementById('chatTitle').innerText = `Ticket #${ticket.id}`;
            document.getElementById('chatReferrer').innerText = `Referrer: ${ticket.referrer}`;

            const box = document.getElementById('messageBox');
            box.innerHTML = ticket.messages.map(m => `
                <div class="flex ${m.sender === 'Customer' ? 'justify-end' : 'justify-start'}">
                    <div class="${m.sender === 'Customer' ? 'bg-white text-black' : 'bg-white/5 border border-white/10'} p-4 rounded-2xl max-w-[85%]">
                        <span class="text-[8px] font-black uppercase opacity-50 block mb-1">${m.sender}</span>
                        <p class="font-medium leading-relaxed">${m.text}</p>
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendMessage(role) {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text) return;

            const tickets = JSON.parse(localStorage.getItem('dm_tickets') || "[]");
            const index = tickets.findIndex(t => t.id === activeTicketId);
            
            tickets[index].messages.push({sender: role, text: text});
            localStorage.setItem('dm_tickets', JSON.stringify(tickets));
            
            input.value = "";
            renderMessages();
        }

        // Admin Features
        function showAdminLogin() { document.getElementById('adminLoginView').classList.remove('hidden'); }
        function hideAdminLogin() { document.getElementById('adminLoginView').classList.add('hidden'); }

        function verifyAdmin() {
            if(document.getElementById('adminPass').value === ADMIN_PASS) {
                isAdminMode = true;
                hideAdminLogin();
                showView('adminDashboard');
                renderAdminList();
            } else {
                alert("Access Denied: Invalid Credentials");
            }
        }

        function renderAdminList() {
            const tickets = JSON.parse(localStorage.getItem('dm_tickets') || "[]");
            const list = document.getElementById('ticketList');
            
            if(tickets.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-gray-600 font-bold uppercase tracking-widest">No Active Tickets</div>`;
                return;
            }

            list.innerHTML = tickets.map(t => `
                <div class="glass p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-xs font-black text-white">${t.id}</span>
                            <span class="text-[9px] bg-white/10 px-2 py-0.5 rounded text-gray-400 uppercase font-bold">Ref: ${t.referrer}</span>
                        </div>
                        <p class="text-sm text-gray-400 font-medium">${t.subject}</p>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="adminManage('${t.id}')" class="flex-1 md:flex-none bg-white text-black px-6 py-2 rounded-lg text-[10px] font-black uppercase">Open</button>
                        <button onclick="deleteTicket('${t.id}')" class="flex-1 md:flex-none border border-red-500/30 text-red-500 px-6 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function adminManage(id) {
            isAdminMode = true;
            openChat(id);
        }

        function deleteTicket(id) {
            if(!confirm("Are you sure you want to permanently delete this ticket?")) return;
            let tickets = JSON.parse(localStorage.getItem('dm_tickets') || "[]");
            tickets = tickets.filter(t => t.id !== id);
            localStorage.setItem('dm_tickets', JSON.stringify(tickets));
            renderAdminList();
        }

        function logoutAdmin() {
            isAdminMode = false;
            location.reload();
        }
    </script>
</body>
</html>
